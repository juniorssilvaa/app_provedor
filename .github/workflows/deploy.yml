name: Build and Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Portainer
        run: |
          echo "🔍 Verificando conexão com Portainer..."
          
          # Configurações
          PORTAINER_URL="https://app-provedor.niochat.com.br"
          API_KEY="${{ secrets.PORTAINER_API_KEY }}"
          ENDPOINT_ID="1" # ID fixo conforme solicitado
          STACK_ID="1" # ID fixo conforme solicitado
          
          # Verifica se o jq está instalado (geralmente está no ubuntu-latest)
          if ! command -v jq &> /dev/null; then
              echo "Installing jq..."
              sudo apt-get update && sudo apt-get install -y jq
          fi

          # 1. Verificar Stack
          echo "Fetching stack info..."
          RESPONSE=$(curl -s -k -H "X-API-Key: $API_KEY" "$PORTAINER_URL/api/stacks/$STACK_ID")
          
          if [[ $RESPONSE == *"Id"* ]]; then
            echo "✅ Stack encontrada: ID=$STACK_ID"
            echo "DEBUG: Portainer Response Body: $RESPONSE"
          else
            echo "❌ Erro ao conectar ou Stack não encontrada. Resposta: $RESPONSE"
            exit 1
          fi

          # 2. Atualizar Stack
          echo "🔄 Atualizando stack no Portainer (Stack ID: $STACK_ID, Endpoint ID: $ENDPOINT_ID)..."
          
          # Ler o arquivo docker-compose.yml e criar o payload JSON de forma segura
          # Note: pullImage=true força o Portainer a baixar as novas imagens do registry
          PAYLOAD=$(jq -n --arg content "$(<docker-compose.yml)" \
            '{stackFileContent: $content, env: [], prune: false, pullImage: true}')

          UPDATE_RESPONSE=$(curl -s -k -X PUT \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID")

          if [[ $UPDATE_RESPONSE == *"Id"* ]]; then
            echo "✅ Deploy finalizado com sucesso na stack $STACK_ID"
            echo "📋 Resposta do Portainer: $UPDATE_RESPONSE"
          else
            echo "❌ Erro ao atualizar stack: $UPDATE_RESPONSE"
            exit 1
          fi
