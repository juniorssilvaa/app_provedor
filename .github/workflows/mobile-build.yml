name: Build Android (APK & AAB)

on:
  workflow_dispatch: # Permite disparar manualmente
    inputs:
      api_token:
        description: 'Token de Integração do Provedor (sk_live_...)'
        required: true
        type: string
  push:
    branches:
      - master
      - 'cliente/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react_native_space

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: react_native_space/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Inject API Token (Optional)
        env:
          # Prioridade: Input Manual > Secret Específico (Branch) > Secret Global
          API_TOKEN_INPUT: ${{ inputs.api_token }}
          API_TOKEN_GLOBAL: ${{ secrets.API_TOKEN }}
          API_TOKEN_NANET: ${{ secrets.API_TOKEN_NANET }}
        run: |
          TOKEN="$API_TOKEN_INPUT"
          
          # Se não veio via input (automático), tenta descobrir pela branch
          if [ -z "$TOKEN" ]; then
            if [[ "${{ github.ref_name }}" == *"nanet"* ]]; then
              TOKEN="$API_TOKEN_NANET"
            fi
          fi
          
          # Fallback para o token global
          if [ -z "$TOKEN" ]; then
            TOKEN="$API_TOKEN_GLOBAL"
          fi

          if [ -n "$TOKEN" ]; then
            # Substitui o placeholder pelo token real APENAS se houver um token nos secrets/input
            sed -i "s/TOKEN_INTEGRACAO_PROVEDOR/$TOKEN/g" src/config/index.ts
            echo "API Token injetado via Secrets/Input com sucesso!"
          else
            echo "Aviso: Nenhum segredo encontrado. O build usará o token que estiver hardcoded no arquivo src/config/index.ts."
          fi

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Remove newlines and decode
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d ' \n\r\t' | base64 --decode > android/app/niochat-global.keystore

      - name: Verify Keystore Password
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ ! -s "android/app/niochat-global.keystore" ]; then
            echo "::error::Keystore não foi gerado (arquivo vazio ou inexistente). Verifique ANDROID_KEYSTORE_BASE64."
            exit 1
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "::error::Segredo ANDROID_KEYSTORE_PASSWORD está vazio ou não cadastrado."
            exit 1
          fi

          keytool -list -keystore "android/app/niochat-global.keystore" -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null

      - name: Build Android Release (AAB & APK)
        env:
          ORG_GRADLE_PROJECT_NANET_UPLOAD_STORE_FILE: niochat-global.keystore
          ORG_GRADLE_PROJECT_NANET_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_NANET_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_NANET_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon --max-workers=2

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: react_native_space/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: react_native_space/android/app/build/outputs/apk/release/app-release.apk
